# paymentprocessing - Application Properties
spring.application.name=paymentprocessing
server.port=8083

# H2 In-Memory Database
spring.datasource.url=jdbc:h2:mem:paymentprocessingdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# Kafka Configuration
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.consumer.group-id=paymentprocessing-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# Logging
logging.level.com.orderprocessing=DEBUG
logging.level.org.springframework.kafka=INFO

# Distributed Tracing (trace-context-lib)
trace.service-name=paymentprocessing
trace.service-prefix=PAY
trace.enabled=true

# ── Security Enhancements ─────────────────────────────────────────────────
# Enhancement 1: JWT Secret (change in production!)
security.jwt.secret=change-me-in-production-must-be-at-least-32-chars-long
# Enhancement 4: Encryption Key (AES-256, 32 chars)
security.encryption.key=change-me-encryption-key-32chars!
# Enhancement 2: Rate Limiting
security.rate-limit.requests-per-minute=100
# Enhancement 6: GDPR
security.gdpr.data-retention-days=730
security.gdpr.anonymize-after-days=365
# Enhancement 5: PCI DSS (payment services)
security.pci.mask-card-numbers=true
security.pci.audit-all-transactions=true
# Spring Security
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8080/auth/realms/app
